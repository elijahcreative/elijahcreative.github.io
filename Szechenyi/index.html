<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Csornai Széchenyi István Általános Iskola - térkép demo</title>
  <link rel="icon" href="cimer-cropped.png">
  <script src="anime.min.js"></script>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("school-theme") || "day";
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #edf8ff;
      --text: #101827;
      --muted: rgba(16, 24, 39, .68);
      --line: rgba(18, 35, 59, .12);
      --glass: rgba(255, 255, 255, .68);
      --glass-strong: rgba(255, 255, 255, .84);
      --card: rgba(255, 255, 255, .82);
      --accent: #168fff;
      --accent-2: #7c5cff;
      --shadow: 0 24px 80px rgba(28, 76, 121, .18);
      --grid: rgba(26, 122, 196, .11);
      --model-shadow: 0 34px 90px rgba(44, 103, 142, .22);
    }

    :root[data-theme="night"] {
      color-scheme: dark;
      --bg: #07142b;
      --text: #f7fbff;
      --muted: rgba(247, 251, 255, .72);
      --line: rgba(255, 255, 255, .18);
      --glass: rgba(8, 20, 48, .56);
      --glass-strong: rgba(13, 32, 76, .72);
      --card: rgba(11, 22, 48, .70);
      --accent: #27c8ff;
      --accent-2: #b15cff;
      --shadow: 0 24px 80px rgba(0, 0, 0, .36);
      --grid: rgba(70, 181, 255, .12);
      --model-shadow: 0 36px 110px rgba(0, 0, 0, .48);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-width: 320px;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button {
      font: inherit;
    }

    .app {
      position: relative;
      min-height: 100svh;
      isolation: isolate;
      background:
        radial-gradient(circle at 76% 14%, rgba(116, 204, 255, .42), transparent 34%),
        radial-gradient(circle at 18% 82%, rgba(255, 255, 255, .86), transparent 36%),
        linear-gradient(135deg, #ffffff 0%, #eef9ff 42%, #dff2ff 100%);
      transition: background .9s cubic-bezier(.2, .8, .2, 1);
    }

    [data-theme="night"] .app {
      background:
        radial-gradient(circle at 78% 18%, color-mix(in srgb, var(--accent) 28%, transparent), transparent 32%),
        radial-gradient(circle at 94% 86%, color-mix(in srgb, var(--accent-2) 30%, transparent), transparent 28%),
        radial-gradient(circle at 28% 78%, rgba(255, 141, 65, .12), transparent 34%),
        var(--bg);
    }

    .scene {
      position: absolute;
      inset: 70px 0 0;
      z-index: -2;
      overflow: hidden;
      isolation: isolate;
      transition: filter .4s ease;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: -20%;
      background-image:
        linear-gradient(30deg, var(--grid) 1px, transparent 1px),
        linear-gradient(150deg, var(--grid) 1px, transparent 1px);
      background-size: 120px 120px;
      opacity: .75;
      transform: rotate(-4deg);
      mask-image: linear-gradient(to bottom, transparent, #000 18%, #000 82%, transparent);
      z-index: 0;
    }

    .scene::after {
      content: "";
      position: absolute;
      left: clamp(130px, 9vw, 210px);
      bottom: clamp(92px, 8vh, 140px);
      width: min(64vw, 1180px);
      height: min(36vw, 620px);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 34% 54%, color-mix(in srgb, var(--accent) 34%, transparent), transparent 48%),
        radial-gradient(ellipse at 72% 50%, color-mix(in srgb, var(--accent-2) 28%, transparent), transparent 56%),
        radial-gradient(ellipse at 42% 74%, rgba(255, 155, 74, .22), transparent 54%);
      filter: blur(66px);
      opacity: .92;
      transform: rotate(-8deg);
      transition: opacity .75s ease, background .75s ease, transform .75s ease;
      pointer-events: none;
      z-index: 1;
    }

    .school-render {
      position: absolute;
      left: clamp(106px, 7vw, 170px);
      bottom: clamp(88px, 7.5vh, 118px);
      width: min(68vw, 1320px);
      max-width: none;
      height: auto;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(var(--model-shadow));
      transform-origin: 42% 66%;
      transition: transform .9s cubic-bezier(.2, .8, .2, 1), filter .75s ease;
      z-index: 2;
    }

    .school-render--night {
      visibility: hidden;
      opacity: 0;
    }

    [data-theme="night"] .school-render--day {
      visibility: hidden;
      opacity: 0;
    }

    [data-theme="night"] .school-render--night {
      visibility: visible;
      opacity: 1;
    }

    .app:hover .school-render {
      transform: scale(1.015) translateY(-4px);
    }

    .veil {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.04), transparent 24%, transparent 72%, rgba(255,255,255,.15)),
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 30%, rgba(255,255,255,.08));
      transition: background .75s ease;
    }

    [data-theme="night"] .veil {
      background:
        linear-gradient(90deg, rgba(0,0,0,.02), transparent 22%, transparent 72%, rgba(0,0,0,.08)),
        linear-gradient(180deg, rgba(0,0,0,.05), transparent 22%, transparent 78%, rgba(0,0,0,.10));
    }

    .topbar {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(18px, 2vw, 32px);
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--glass) 74%, transparent);
      backdrop-filter: blur(22px) saturate(145%);
      -webkit-backdrop-filter: blur(22px) saturate(145%);
    }

    .brand,
    .nav,
    .nav-item,
    .control,
    .action,
    .chip,
    .theme-toggle {
      display: inline-flex;
      align-items: center;
    }

    .brand {
      min-width: 0;
      gap: 16px;
      font-size: clamp(18px, 1.45vw, 25px);
      font-weight: 750;
      letter-spacing: -.035em;
      white-space: nowrap;
    }

    .crest {
      width: 42px;
      height: 48px;
      flex: 0 0 auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 22px rgba(0,0,0,.18));
    }

    .nav {
      gap: clamp(12px, 1.6vw, 24px);
      color: var(--text);
      font-size: 17px;
      font-weight: 500;
    }

    .nav-item {
      gap: 10px;
      opacity: .92;
    }

    .separator {
      height: 24px;
      width: 1px;
      background: var(--line);
    }

    .icon {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .menu-icon {
      width: 30px;
    }

    .theme-toggle {
      gap: 9px;
      min-height: 40px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: var(--glass);
      backdrop-filter: blur(18px);
      cursor: pointer;
      transition: transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
      background: var(--glass-strong);
    }

    .hotspot {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      background: var(--card);
      box-shadow: 0 12px 34px rgba(0,0,0,.16);
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
      font-size: clamp(14px, 1.05vw, 18px);
      font-weight: 560;
      letter-spacing: -.02em;
      cursor: default;
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease;
    }

    .hotspot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 1px;
      height: var(--line-h, 72px);
      background: linear-gradient(var(--line), color-mix(in srgb, var(--accent) 48%, transparent));
      transform: translateX(-50%);
      opacity: .8;
    }

    .hotspot::before {
      content: "";
      position: absolute;
      left: calc(50% - 4px);
      top: calc(100% + var(--line-h, 72px) - 4px);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--accent) 70%, #fff);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 80%, transparent);
    }

    .hotspot:hover {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
      background: var(--glass-strong);
      box-shadow: 0 18px 44px rgba(0,0,0,.22);
    }

    .hotspot.active {
      border-color: color-mix(in srgb, var(--accent) 72%, #fff);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--accent) 38%, transparent) inset,
        0 0 28px color-mix(in srgb, var(--accent) 52%, transparent),
        0 18px 44px rgba(0,0,0,.22);
    }

    .h-news { left: 9%; top: 13%; --line-h: 72px; }
    .h-docs { left: 27%; top: 13%; --line-h: 106px; }
    .h-events { left: 42.8%; top: 16%; --line-h: 114px; }
    .h-staff { left: 58%; top: 18%; --line-h: 88px; }
    .h-enroll { left: 10.2%; bottom: 28.8%; --line-h: 48px; }
    .h-gallery { left: 36.2%; bottom: 31.5%; --line-h: 62px; }
    .h-projects { left: 16.8%; bottom: 18.5%; --line-h: 54px; }
    .h-contact { left: 36%; bottom: 12%; --line-h: 62px; }

    .h-enroll::after,
    .h-gallery::after,
    .h-projects::after,
    .h-contact::after {
      top: auto;
      bottom: 100%;
      background: linear-gradient(to top, var(--line), color-mix(in srgb, var(--accent) 48%, transparent));
    }

    .h-enroll::before,
    .h-gallery::before,
    .h-projects::before,
    .h-contact::before {
      top: auto;
      bottom: calc(100% + var(--line-h, 56px) - 4px);
    }

    .side-panel {
      position: absolute;
      top: clamp(104px, 12vh, 146px);
      right: clamp(18px, 2vw, 32px);
      width: clamp(300px, 21vw, 360px);
      min-height: clamp(560px, 74vh, 760px);
      padding: clamp(26px, 3vw, 38px);
      border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line));
      border-radius: 24px;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--glass-strong) 94%, transparent), color-mix(in srgb, var(--accent-2) 12%, var(--glass))),
        var(--glass);
      box-shadow:
        0 0 36px color-mix(in srgb, var(--accent) 22%, transparent),
        var(--shadow);
      backdrop-filter: blur(28px) saturate(150%);
      -webkit-backdrop-filter: blur(28px) saturate(150%);
      transition: transform .26s ease, box-shadow .26s ease, border-color .26s ease;
    }

    .side-panel:hover {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--accent) 68%, #fff);
      box-shadow:
        0 0 48px color-mix(in srgb, var(--accent) 30%, transparent),
        var(--shadow);
    }

    .close {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 32px;
      height: 32px;
      border: 0;
      color: var(--text);
      background: transparent;
      cursor: pointer;
      opacity: .82;
      transition: transform .2s ease, opacity .2s ease;
    }

    .close:hover {
      transform: rotate(90deg);
      opacity: 1;
    }

    .panel-icon {
      width: 72px;
      height: 72px;
      margin: 22px 0 38px;
      color: var(--accent);
      filter: drop-shadow(0 0 20px color-mix(in srgb, var(--accent) 45%, transparent));
    }

    .side-panel h1 {
      margin: 0;
      font-size: clamp(34px, 2.7vw, 44px);
      line-height: 1.03;
      letter-spacing: -.055em;
      font-weight: 800;
    }

    .accent-line {
      width: 54px;
      height: 4px;
      margin: 18px 0 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent-2) 70%, var(--accent)));
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 52%, transparent);
    }

    .side-panel p {
      max-width: 26ch;
      margin: 0 0 38px;
      color: var(--muted);
      font-size: clamp(17px, 1.35vw, 21px);
      line-height: 1.48;
      font-weight: 420;
      letter-spacing: -.015em;
    }

    .action {
      justify-content: space-between;
      width: 100%;
      min-height: 66px;
      margin-top: 18px;
      padding: 0 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: color-mix(in srgb, var(--glass) 76%, transparent);
      backdrop-filter: blur(18px);
      font-size: 18px;
      font-weight: 600;
      cursor: default;
      transition: transform .22s ease, border-color .22s ease, background .22s ease;
    }

    .action span {
      display: inline-flex;
      align-items: center;
      gap: 14px;
    }

    .action:hover {
      transform: translateX(4px);
      border-color: color-mix(in srgb, var(--accent) 54%, var(--line));
      background: var(--glass-strong);
    }

    .blueprint {
      position: absolute;
      left: 36px;
      right: 36px;
      bottom: 22px;
      height: 160px;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
      opacity: .34;
      pointer-events: none;
    }

    .controls {
      position: absolute;
      left: clamp(18px, 2vw, 32px);
      bottom: clamp(18px, 2.2vw, 32px);
      display: grid;
      grid-template-columns: repeat(3, minmax(86px, 1fr));
      min-width: 330px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--glass);
      box-shadow: 0 20px 56px rgba(0,0,0,.18);
      backdrop-filter: blur(22px) saturate(145%);
      overflow: hidden;
    }

    .control {
      min-height: 82px;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      cursor: default;
      transition: background .22s ease, color .22s ease;
    }

    .control:last-child {
      border-right: 0;
    }

    .control:hover,
    .control.active {
      background: color-mix(in srgb, var(--accent) 13%, transparent);
    }

    .control.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 54px;
      height: 4px;
      border-radius: 999px 999px 0 0;
      background: var(--accent);
    }

    @media (max-width: 1100px) {
      .scene {
        inset: 64px 0 0;
      }

      .school-render {
        left: 50%;
        bottom: 34vh;
        width: min(132vw, 980px);
        transform: translateX(-52%);
      }

      .app:hover .school-render {
        transform: translateX(-52%) scale(1.012) translateY(-3px);
      }

      .hotspot {
        display: none;
      }

      .side-panel {
        width: min(420px, calc(100vw - 36px));
        min-height: auto;
        top: auto;
        left: 18px;
        right: 18px;
        bottom: 18px;
        padding: 24px;
        border-radius: 24px;
      }

      .panel-icon,
      .blueprint {
        display: none;
      }

      .side-panel p {
        max-width: none;
        margin-bottom: 18px;
      }

      .action {
        min-height: 54px;
        margin-top: 10px;
      }

      .controls {
        display: none;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        height: 64px;
      }

      .brand span {
        max-width: 56vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .crest {
        width: 34px;
        height: 40px;
      }

      .nav-item span,
      .separator {
        display: none;
      }

      .nav {
        gap: 10px;
      }

      .theme-toggle {
        width: 40px;
        padding: 0;
        justify-content: center;
      }

      .theme-toggle span {
        display: none;
      }

      .side-panel {
        max-height: 43svh;
        overflow: hidden;
      }

      .school-render {
        bottom: 40vh;
        width: 150vw;
      }

      .side-panel h1 {
        font-size: 30px;
      }

      .side-panel p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Interaktív iskola térkép bemutató">
    <div class="scene" aria-hidden="true">
      <img class="school-render school-render--day" src="school-day.png" alt="">
      <img class="school-render school-render--night" src="school-night.png" alt="">
    </div>
    <div class="veil" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <img class="crest" src="cimer-cropped.png" alt="">
        <span>Csornai Széchenyi István Általános Iskola</span>
      </div>

      <nav class="nav" aria-label="Fő navigáció">
        <div class="nav-item">
          <svg class="icon" viewBox="0 0 24 24"><path d="m3 10 9-7 9 7"/><path d="M5 9.5V21h14V9.5"/><path d="M9 21v-7h6v7"/></svg>
          <span>Kezdőlap</span>
        </div>
        <div class="separator"></div>
        <div class="nav-item">
          <svg class="icon" viewBox="0 0 24 24"><path d="m2 8 10-5 10 5-10 5-10-5Z"/><path d="M6 10.5v5c0 1.7 2.7 3.5 6 3.5s6-1.8 6-3.5v-5"/></svg>
          <span>KRÉTA</span>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Téma váltása">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v2"/><path d="M12 19v2"/><path d="M5.6 5.6 7 7"/><path d="m17 17 1.4 1.4"/><path d="M3 12h2"/><path d="M19 12h2"/><path d="m5.6 18.4 1.4-1.4"/><path d="m17 7 1.4-1.4"/><circle cx="12" cy="12" r="4"/></svg>
          <span>Világos</span>
        </button>
        <svg class="icon menu-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
      </nav>
    </header>

    <div class="hotspot h-news">
      <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>
      Hírek
    </div>
    <div class="hotspot h-docs">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 20h16a2 2 0 0 0 2-2V8H12L10 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2Z"/></svg>
      Dokumentumok
    </div>
    <div class="hotspot h-events">
      <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/></svg>
      Események
    </div>
    <div class="hotspot h-staff">
      <svg class="icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-8 0v2"/><circle cx="12" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Tantestület
    </div>
    <div class="hotspot h-enroll active">
      <svg class="icon" viewBox="0 0 24 24"><path d="M7 8V7a5 5 0 0 1 10 0v1"/><rect x="5" y="8" width="14" height="13" rx="2"/><path d="M9 13h6"/><path d="M9 17h6"/></svg>
      Beiskolázás
    </div>
    <div class="hotspot h-gallery">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="10" r="2"/><path d="m21 15-5-5L5 19"/></svg>
      Galéria
    </div>
    <div class="hotspot h-projects">
      <svg class="icon" viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.74V17h8v-2.26A7 7 0 0 0 12 2Z"/></svg>
      Projektjeink
    </div>
    <div class="hotspot h-contact">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      Kapcsolat
    </div>

    <aside class="side-panel" aria-label="Beiskolázás panel">
      <button class="close" type="button" aria-label="Panel bezárása">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <svg class="panel-icon" viewBox="0 0 64 64" aria-hidden="true">
        <path d="M20 24v-5c0-6.5 5.2-11 12-11s12 4.5 12 11v5" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <rect x="16" y="22" width="32" height="32" rx="8" fill="none" stroke="currentColor" stroke-width="3"/>
        <path d="M24 32h16M24 41h16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <path d="M13 31h-2a5 5 0 0 0-5 5v8a5 5 0 0 0 5 5h2M51 31h2a5 5 0 0 1 5 5v8a5 5 0 0 1-5 5h-2" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h1>Beiskolázás</h1>
      <div class="accent-line"></div>
      <p>Információk leendő első osztályosoknak, programok és dokumentumok egy helyen.</p>

      <div class="action">
        <span>
          <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/></svg>
          Programok
        </span>
        <svg class="icon" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="action">
        <span>
          <svg class="icon" viewBox="0 0 24 24"><path d="M4 20h16a2 2 0 0 0 2-2V8H12L10 5H4a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2Z"/></svg>
          Dokumentumok
        </span>
        <svg class="icon" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <svg class="blueprint" viewBox="0 0 260 150" aria-hidden="true">
        <path d="M24 136h212M42 136V78h176v58M64 136V96h34v40M162 136V96h34v40M110 136V92h40v44M58 78c6-28 30-49 72-49s66 21 72 49M82 78c4-17 20-30 48-30s44 13 48 30" fill="none" stroke="currentColor" stroke-width="2"/>
      </svg>
    </aside>

    <div class="controls" aria-label="Térkép vezérlők">
      <button class="control active" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="m3 6 6-3 6 3 6-3v15l-6 3-6-3-6 3V6Z"/><path d="M9 3v15"/><path d="M15 6v15"/></svg>
        Iskola térkép
      </button>
      <button class="control" type="button">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-9 9"/><path d="M3 12a9 9 0 0 1 9-9"/><path d="m16 16 5-4-5-4"/><path d="M8 8 3 12l5 4"/></svg>
        Forgatás
      </button>
      <button class="control" type="button">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/><path d="M11 8v6"/><path d="M8 11h6"/></svg>
        Nagyítás
      </button>
    </div>
  </main>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById("themeToggle");
    const label = toggle.querySelector("span");
    const scene = document.querySelector(".scene");
    const topbar = document.querySelector(".topbar");
    const panel = document.querySelector(".side-panel");
    const controls = document.querySelector(".controls");
    const hotspots = Array.from(document.querySelectorAll(".hotspot"));
    const dayRender = document.querySelector(".school-render--day");
    const nightRender = document.querySelector(".school-render--night");
    let isAnimatingTheme = false;

    function syncThemeLabel() {
      label.textContent = root.dataset.theme === "night" ? "Sötét" : "Világos";
    }

    function activeRenderFor(theme) {
      return theme === "night" ? nightRender : dayRender;
    }

    function inactiveRenderFor(theme) {
      return theme === "night" ? dayRender : nightRender;
    }

    function finishThemeSwitch(nextTheme) {
      [dayRender, nightRender, scene, topbar, panel, controls, toggle, ...hotspots].forEach((el) => {
        if (!el) return;
        el.style.opacity = "";
        el.style.transform = "";
        el.style.filter = "";
        el.style.visibility = "";
      });
      root.dataset.theme = nextTheme;
      localStorage.setItem("school-theme", nextTheme);
      syncThemeLabel();
      isAnimatingTheme = false;
    }

    function switchThemeWithAnime(nextTheme) {
      if (!window.anime) {
        root.dataset.theme = nextTheme;
        localStorage.setItem("school-theme", nextTheme);
        syncThemeLabel();
        return;
      }

      isAnimatingTheme = true;
      toggle.disabled = true;

      const currentTheme = root.dataset.theme === "night" ? "night" : "day";
      const outgoing = activeRenderFor(currentTheme);
      const incoming = activeRenderFor(nextTheme);
      const supporting = [topbar, panel, controls].filter(Boolean);

      anime.remove([dayRender, nightRender, scene, topbar, panel, controls, toggle, ...hotspots]);

      incoming.style.visibility = "visible";
      incoming.style.opacity = "0";
      outgoing.style.visibility = "visible";
      outgoing.style.opacity = "1";

      const timeline = anime.timeline({
        easing: "easeOutCubic",
        complete: () => {
          toggle.disabled = false;
          finishThemeSwitch(nextTheme);
        },
      });

      timeline
        .add({
          targets: supporting,
          opacity: [1, 0.82],
          translateY: [0, -8],
          scale: [1, 0.985],
          duration: 210,
          easing: "easeOutQuad",
        }, 0)
        .add({
          targets: hotspots,
          opacity: [1, 0.68],
          translateY: [0, -10],
          scale: [1, 0.94],
          delay: anime.stagger(14, { from: "center" }),
          duration: 220,
          easing: "easeOutQuad",
        }, 20)
        .add({
          targets: scene,
          filter: ["saturate(1) brightness(1)", "saturate(.86) brightness(.92)"],
          duration: 260,
          easing: "easeOutQuad",
        }, 0)
        .add({
          targets: outgoing,
          opacity: [1, 0],
          scale: [1, 0.985],
          translateY: [0, 10],
          duration: 320,
          easing: "easeInOutSine",
        }, 120)
        .add({
          targets: incoming,
          opacity: [0, 1],
          scale: [1.012, 1],
          translateY: [-8, 0],
          duration: 360,
          easing: "easeOutQuart",
          begin: () => {
            root.dataset.theme = nextTheme;
            localStorage.setItem("school-theme", nextTheme);
            syncThemeLabel();
          },
        }, 230)
        .add({
          targets: supporting,
          opacity: [0.82, 1],
          translateY: [-8, 0],
          scale: [0.985, 1],
          duration: 390,
          easing: "easeOutExpo",
        }, 420)
        .add({
          targets: hotspots,
          opacity: [0.68, 1],
          translateY: [-10, 0],
          scale: [0.94, 1],
          delay: anime.stagger(22, { from: "center" }),
          duration: 420,
          easing: "easeOutExpo",
        }, 430)
        .add({
          targets: scene,
          filter: ["saturate(.86) brightness(.92)", "saturate(1) brightness(1)"],
          duration: 440,
          easing: "easeOutExpo",
        }, 430);
    }

    syncThemeLabel();

    toggle.addEventListener("click", () => {
      if (isAnimatingTheme) return;
      const next = root.dataset.theme === "night" ? "day" : "night";
      switchThemeWithAnime(next);
    });
  </script>
</body>
</html>
