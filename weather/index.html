<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daylight Gradient Widget</title>
    <style>
      :root {
        --widget-width: 658px;
        --sky-top: #1d529d;
        --sky-mid: #4478bb;
        --sky-bottom: #86b0de;
        --tint-top: rgba(255, 255, 255, 0.015);
        --tint-bottom: rgba(255, 255, 255, 0);
        --pool-a: rgba(228, 205, 162, 0.04);
        --pool-b: rgba(255, 255, 255, 0.06);
        --horizon: rgba(180, 212, 242, 0.12);
        --lift: rgba(255, 255, 255, 0.025);
        --vignette-top: rgba(13, 26, 44, 0.065);
        --vignette-bottom: rgba(13, 26, 44, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        place-items: start center;
        min-height: 100vh;
        padding: 0;
        background: transparent;
      }

      .widget-shell {
        width: min(100%, var(--widget-width));
      }

      .weather-widget {
        position: relative;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 329 / 155;
        isolation: isolate;
        background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 56%, var(--sky-bottom) 100%);
      }

      .sky-base,
      .sky-tint,
      .light-pool,
      .horizon-glow,
      .vignette {
        position: absolute;
        inset: 0;
      }

      .sky-base {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.025), transparent 28%),
          linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 56%, var(--sky-bottom) 100%);
      }

      .sky-tint {
        background: linear-gradient(180deg, var(--tint-top) 0%, var(--tint-bottom) 100%);
      }

      .light-pool {
        mix-blend-mode: screen;
      }

      .light-pool-a {
        background: radial-gradient(circle at 18% 20%, var(--pool-a), transparent 34%);
      }

      .light-pool-b {
        background: radial-gradient(circle at 78% 18%, var(--pool-b), transparent 30%);
      }

      .horizon-glow {
        top: auto;
        height: 44%;
        background:
          linear-gradient(180deg, transparent 0%, var(--horizon) 100%),
          linear-gradient(180deg, transparent 10%, var(--lift) 100%);
      }

      .vignette {
        background:
          linear-gradient(180deg, var(--vignette-top), transparent 34%),
          linear-gradient(180deg, transparent 62%, var(--vignette-bottom) 100%);
      }

      .weather-widget[data-phase="dawn"] {
        --sky-top: #355b8d;
        --sky-mid: #d67eaf;
        --sky-bottom: #f3b1c8;
        --tint-top: rgba(132, 163, 255, 0.12);
        --tint-bottom: rgba(255, 255, 255, 0.02);
        --pool-a: rgba(255, 178, 214, 0.18);
        --pool-b: rgba(255, 222, 241, 0.14);
        --horizon: rgba(244, 175, 214, 0.22);
        --vignette-top: rgba(19, 32, 61, 0.08);
        --vignette-bottom: rgba(88, 48, 70, 0.12);
      }

      .weather-widget[data-phase="morning"] {
        --sky-top: #2f7fcb;
        --sky-mid: #63b9ea;
        --sky-bottom: #a8e3f2;
        --tint-top: rgba(255, 255, 255, 0.03);
        --tint-bottom: rgba(255, 255, 255, 0);
        --pool-a: rgba(176, 241, 255, 0.08);
        --pool-b: rgba(255, 255, 255, 0.1);
        --horizon: rgba(196, 246, 255, 0.18);
        --vignette-top: rgba(16, 28, 42, 0.035);
        --vignette-bottom: rgba(16, 28, 42, 0.04);
      }

      .weather-widget[data-phase="day"] {
        --sky-top: #1d529d;
        --sky-mid: #4478bb;
        --sky-bottom: #86b0de;
        --tint-top: rgba(255, 255, 255, 0.015);
        --tint-bottom: rgba(255, 255, 255, 0);
        --pool-a: rgba(228, 205, 162, 0.04);
        --pool-b: rgba(255, 255, 255, 0.06);
        --horizon: rgba(180, 212, 242, 0.12);
        --vignette-top: rgba(13, 26, 44, 0.065);
        --vignette-bottom: rgba(13, 26, 44, 0.05);
      }

      .weather-widget[data-phase="golden-hour"] {
        --sky-top: #4f77b3;
        --sky-mid: #efa06d;
        --sky-bottom: #e9ab7c;
        --tint-top: rgba(126, 151, 224, 0.1);
        --tint-bottom: rgba(255, 205, 164, 0.06);
        --pool-a: rgba(255, 180, 98, 0.18);
        --pool-b: rgba(255, 214, 179, 0.12);
        --horizon: rgba(242, 166, 104, 0.24);
        --vignette-top: rgba(22, 28, 54, 0.06);
        --vignette-bottom: rgba(88, 44, 34, 0.14);
      }

      .weather-widget[data-phase="dusk"] {
        --sky-top: #66486d;
        --sky-mid: #b05f77;
        --sky-bottom: #e29a8a;
        --tint-top: rgba(214, 138, 178, 0.08);
        --tint-bottom: rgba(255, 214, 187, 0.06);
        --pool-a: rgba(255, 174, 120, 0.16);
        --pool-b: rgba(245, 194, 216, 0.08);
        --horizon: rgba(255, 180, 138, 0.24);
        --vignette-top: rgba(34, 18, 24, 0.12);
        --vignette-bottom: rgba(36, 22, 28, 0.14);
      }

      .weather-widget[data-phase="night"] {
        --sky-top: #06101f;
        --sky-mid: #123153;
        --sky-bottom: #2f5175;
        --tint-top: rgba(73, 118, 184, 0.12);
        --tint-bottom: rgba(255, 255, 255, 0.02);
        --pool-a: rgba(93, 128, 182, 0.12);
        --pool-b: rgba(174, 205, 255, 0.08);
        --horizon: rgba(106, 148, 197, 0.12);
        --vignette-top: rgba(0, 0, 0, 0.18);
        --vignette-bottom: rgba(0, 0, 0, 0.2);
      }

      @media (max-width: 680px) {
        .widget-shell {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="widget-shell">
      <section class="weather-widget" id="weather-widget" data-phase="day">
        <div class="sky-base"></div>
        <div class="sky-tint"></div>
        <div class="light-pool light-pool-a"></div>
        <div class="light-pool light-pool-b"></div>
        <div class="horizon-glow"></div>
        <div class="vignette"></div>
      </section>
    </main>
    <script>
      const fallbackConfig = {
        latitude: 47.4979,
        longitude: 19.0402,
      };

      const previewPhases = new Set(["dawn", "morning", "day", "golden-hour", "dusk", "night"]);

      const paletteStops = [
        { t: 0, phase: "night", top: "#06101f", mid: "#123153", bottom: "#2f5175", tintTop: "rgba(73, 118, 184, 0.12)", tintBottom: "rgba(255, 255, 255, 0.02)", poolA: "rgba(93, 128, 182, 0.12)", poolB: "rgba(174, 205, 255, 0.08)", horizon: "rgba(106, 148, 197, 0.12)", vignetteTop: "rgba(0, 0, 0, 0.18)", vignetteBottom: "rgba(0, 0, 0, 0.2)" },
        { t: 0.23, phase: "dawn", top: "#355b8d", mid: "#d67eaf", bottom: "#f3b1c8", tintTop: "rgba(132, 163, 255, 0.12)", tintBottom: "rgba(255, 255, 255, 0.02)", poolA: "rgba(255, 178, 214, 0.18)", poolB: "rgba(255, 222, 241, 0.14)", horizon: "rgba(244, 175, 214, 0.22)", vignetteTop: "rgba(19, 32, 61, 0.08)", vignetteBottom: "rgba(88, 48, 70, 0.12)" },
        { t: 0.32, phase: "morning", top: "#2f7fcb", mid: "#63b9ea", bottom: "#a8e3f2", tintTop: "rgba(255, 255, 255, 0.03)", tintBottom: "rgba(255, 255, 255, 0)", poolA: "rgba(176, 241, 255, 0.08)", poolB: "rgba(255, 255, 255, 0.1)", horizon: "rgba(196, 246, 255, 0.18)", vignetteTop: "rgba(16, 28, 42, 0.035)", vignetteBottom: "rgba(16, 28, 42, 0.04)" },
        { t: 0.5, phase: "day", top: "#1d529d", mid: "#4478bb", bottom: "#86b0de", tintTop: "rgba(255, 255, 255, 0.015)", tintBottom: "rgba(255, 255, 255, 0)", poolA: "rgba(228, 205, 162, 0.04)", poolB: "rgba(255, 255, 255, 0.06)", horizon: "rgba(180, 212, 242, 0.12)", vignetteTop: "rgba(13, 26, 44, 0.065)", vignetteBottom: "rgba(13, 26, 44, 0.05)" },
        { t: 0.72, phase: "golden-hour", top: "#4f77b3", mid: "#efa06d", bottom: "#e9ab7c", tintTop: "rgba(126, 151, 224, 0.1)", tintBottom: "rgba(255, 205, 164, 0.06)", poolA: "rgba(255, 180, 98, 0.18)", poolB: "rgba(255, 214, 179, 0.12)", horizon: "rgba(242, 166, 104, 0.24)", vignetteTop: "rgba(22, 28, 54, 0.06)", vignetteBottom: "rgba(88, 44, 34, 0.14)" },
        { t: 0.8, phase: "dusk", top: "#66486d", mid: "#b05f77", bottom: "#e29a8a", tintTop: "rgba(214, 138, 178, 0.08)", tintBottom: "rgba(255, 214, 187, 0.06)", poolA: "rgba(255, 174, 120, 0.16)", poolB: "rgba(245, 194, 216, 0.08)", horizon: "rgba(255, 180, 138, 0.24)", vignetteTop: "rgba(34, 18, 24, 0.12)", vignetteBottom: "rgba(36, 22, 28, 0.14)" },
        { t: 0.854, phase: "night", top: "#06101f", mid: "#123153", bottom: "#2f5175", tintTop: "rgba(73, 118, 184, 0.12)", tintBottom: "rgba(255, 255, 255, 0.02)", poolA: "rgba(93, 128, 182, 0.12)", poolB: "rgba(174, 205, 255, 0.08)", horizon: "rgba(106, 148, 197, 0.12)", vignetteTop: "rgba(0, 0, 0, 0.18)", vignetteBottom: "rgba(0, 0, 0, 0.2)" },
      ];

      let transitionMinutes = 60;

      async function loadSettings() {
        try {
          const res = await fetch('settings.json');
          if (!res.ok) return;
          const settings = await res.json();
          if (typeof settings.transitionMinutes === 'number') {
            transitionMinutes = settings.transitionMinutes;
          }
          if (Array.isArray(settings.palettes) && settings.palettes.length === paletteStops.length) {
            settings.palettes.forEach((saved, index) => {
              const { t, phase, ...colors } = saved;
              Object.assign(paletteStops[index], colors);
            });
          }
        } catch (e) {
          // settings.json not found — use built-in defaults
        }
      }

      function getParams() {
        const params = new URLSearchParams(window.location.search);
        const latitude = Number(params.get("lat") || fallbackConfig.latitude);
        const longitude = Number(params.get("lon") || fallbackConfig.longitude);
        const previewPhase = params.get("phase");
        const progressParam = params.get("progress");
        const previewProgress = progressParam === null ? null : Number(progressParam);

        return {
          latitude: Number.isFinite(latitude) ? latitude : fallbackConfig.latitude,
          longitude: Number.isFinite(longitude) ? longitude : fallbackConfig.longitude,
          previewPhase: previewPhases.has(previewPhase) ? previewPhase : null,
          previewProgress: previewProgress !== null && Number.isFinite(previewProgress) ? Math.min(1, Math.max(0, previewProgress)) : null,
        };
      }

      function hexToRgb(hex) {
        const value = hex.replace("#", "");
        return {
          r: Number.parseInt(value.slice(0, 2), 16),
          g: Number.parseInt(value.slice(2, 4), 16),
          b: Number.parseInt(value.slice(4, 6), 16),
        };
      }

      function parseRgba(input) {
        const match = input.match(/rgba?\(([^)]+)\)/);
        if (!match) return { r: 255, g: 255, b: 255, a: 1 };
        const parts = match[1].split(",").map((part) => Number.parseFloat(part.trim()));
        return { r: parts[0], g: parts[1], b: parts[2], a: parts[3] ?? 1 };
      }

      function mixNumber(a, b, t) {
        return a + (b - a) * t;
      }

      function mixHex(a, b, t) {
        const ca = hexToRgb(a);
        const cb = hexToRgb(b);
        const r = Math.round(mixNumber(ca.r, cb.r, t));
        const g = Math.round(mixNumber(ca.g, cb.g, t));
        const bValue = Math.round(mixNumber(ca.b, cb.b, t));
        return `rgb(${r}, ${g}, ${bValue})`;
      }

      function mixRgba(a, b, t) {
        const ca = parseRgba(a);
        const cb = parseRgba(b);
        const r = Math.round(mixNumber(ca.r, cb.r, t));
        const g = Math.round(mixNumber(ca.g, cb.g, t));
        const bValue = Math.round(mixNumber(ca.b, cb.b, t));
        const alpha = mixNumber(ca.a, cb.a, t).toFixed(3);
        return `rgba(${r}, ${g}, ${bValue}, ${alpha})`;
      }

      function mixPalettes(A, B, t) {
        return {
          top:            mixHex (A.top,            B.top,            t),
          mid:            mixHex (A.mid,            B.mid,            t),
          bottom:         mixHex (A.bottom,         B.bottom,         t),
          tintTop:        mixRgba(A.tintTop,        B.tintTop,        t),
          tintBottom:     mixRgba(A.tintBottom,     B.tintBottom,     t),
          poolA:          mixRgba(A.poolA,          B.poolA,          t),
          poolB:          mixRgba(A.poolB,          B.poolB,          t),
          horizon:        mixRgba(A.horizon,        B.horizon,        t),
          vignetteTop:    mixRgba(A.vignetteTop,    B.vignetteTop,    t),
          vignetteBottom: mixRgba(A.vignetteBottom, B.vignetteBottom, t),
        };
      }

      function getInterpolatedPalette(progress) {
        const half = (transitionMinutes / 2) / 1440;

        for (let i = 1; i < paletteStops.length; i++) {
          const c = paletteStops[i].t;
          const isLast   = i === paletteStops.length - 1;
          const winStart = isLast ? c - 2 * half : c - half;
          const winEnd   = isLast ? c             : c + half;

          if (progress >= winStart && progress < winEnd) {
            const u = (progress - winStart) / (2 * half);
            const t = u * u * (3 - 2 * u); // smoothstep
            return mixPalettes(paletteStops[i - 1], paletteStops[i], t);
          }
        }

        let settled = paletteStops[0];
        for (let i = 1; i < paletteStops.length; i++) {
          const isLast = i === paletteStops.length - 1;
          const winEnd = isLast ? paletteStops[i].t : paletteStops[i].t + half;
          if (progress >= winEnd) settled = paletteStops[i];
        }
        return mixPalettes(settled, settled, 0);
      }

      function getProgressForPhase(phase) {
        const stop = paletteStops.find((item) => item.phase === phase);
        return stop ? stop.t : 0.5;
      }

      function getDaylightProgress(now, sunriseIso, sunsetIso) {
        const current = now.getTime();
        const sunrise = new Date(sunriseIso).getTime();
        const sunset = new Date(sunsetIso).getTime();

        if (current >= sunrise && current <= sunset) {
          const dayProgress = (current - sunrise) / (sunset - sunrise || 1);
          return 0.23 + dayProgress * (0.8 - 0.23);
        }

        const dayMs = 24 * 60 * 60 * 1000;
        const previousSunset = current > sunset ? sunset : sunset - dayMs;
        const nextSunrise = current < sunrise ? sunrise : sunrise + dayMs;
        const nightProgress = (current - previousSunset) / (nextSunrise - previousSunset || 1);

        if (current > sunset) return 0.8 + nightProgress * 0.2;
        return nightProgress * 0.23;
      }

      function applyPalette(progress) {
        const widget = document.getElementById("weather-widget");
        const palette = getInterpolatedPalette(progress);

        widget.style.setProperty("--sky-top", palette.top);
        widget.style.setProperty("--sky-mid", palette.mid);
        widget.style.setProperty("--sky-bottom", palette.bottom);
        widget.style.setProperty("--tint-top", palette.tintTop);
        widget.style.setProperty("--tint-bottom", palette.tintBottom);
        widget.style.setProperty("--pool-a", palette.poolA);
        widget.style.setProperty("--pool-b", palette.poolB);
        widget.style.setProperty("--horizon", palette.horizon);
        widget.style.setProperty("--vignette-top", palette.vignetteTop);
        widget.style.setProperty("--vignette-bottom", palette.vignetteBottom);
      }

      async function fetchSunTimes() {
        const params = getParams();
        const url = new URL("https://api.open-meteo.com/v1/forecast");

        url.searchParams.set("latitude", params.latitude);
        url.searchParams.set("longitude", params.longitude);
        url.searchParams.set("daily", "sunrise,sunset");
        url.searchParams.set("timezone", "auto");
        url.searchParams.set("forecast_days", "1");

        const response = await fetch(url.toString());
        if (!response.ok) {
          throw new Error(`Sun request failed with status ${response.status}`);
        }

        return response.json();
      }

      function applyFallbackPhase() {
        const now = new Date();
        const sunrise = new Date(now);
        const sunset = new Date(now);
        sunrise.setHours(6, 0, 0, 0);
        sunset.setHours(18, 0, 0, 0);
        applyPalette(getDaylightProgress(now, sunrise.toISOString(), sunset.toISOString()));
      }

      async function init() {
        await loadSettings();
        const params = getParams();

        if (params.previewPhase) {
          applyPalette(getProgressForPhase(params.previewPhase));
          return;
        }

        if (params.previewProgress !== null) {
          applyPalette(params.previewProgress);
          return;
        }

        try {
          const data = await fetchSunTimes();
          applyPalette(getDaylightProgress(new Date(), data.daily.sunrise[0], data.daily.sunset[0]));
        } catch (error) {
          console.error("Daylight gradient fallback activated.", error);
          applyFallbackPhase();
        }
      }

      init();
    </script>
  </body>
</html>
