   ADD FEED MODAL
════════════════════════════════════════════════════════════ */
function openAddModal() {
  $('feedUrl').value = '';
  $('feedName').value = '';
  $('feedErr').classList.remove('show');
  $('confirmAdd').disabled = false;
  $('confirmAdd').textContent = 'Hozzáadás';
  $('addModal').classList.add('open');
  $('overlay').classList.add('open');
  setTimeout(() => $('feedUrl').focus(), 80);
}
function closeAddModal() {
  $('addModal').classList.remove('open');
  $('overlay').classList.remove('open');
}

async function submitAddFeed() {
  let url = $('feedUrl').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;

  if (S.feeds.find(f => f.url === url)) { toast('Ez a feed már létezik.'); closeAddModal(); return; }

  const btn = $('confirmAdd');
  btn.disabled = true;
  btn.textContent = 'Betöltés...';
  $('feedErr').classList.remove('show');

  const articles = await Fetcher.get(url).catch(() => []);

  if (!articles.length) {
    $('feedErr').classList.add('show');
    btn.disabled = false; btn.textContent = 'Hozzáadás';
    return;
  }

  let name = $('feedName').value.trim();
  if (!name) {
    try { name = new URL(url).hostname.replace(/^www\./,'').split('.')[0]; name = name[0].toUpperCase() + name.slice(1); }
    catch(e) { name = url; }
  }

  const color = $('addModal')._pickedColor || FEED_COLORS[S.feeds.length % FEED_COLORS.length];
  S.feeds.push({ url, name, color });
  S.articles = S.articles.filter(a => a.feedUrl !== url);
  S.articles.push(...articles);
  S.articles.sort((a, b) => b.date - a.date);
  saveFeeds();
  renderSidebar();
  renderSFeeds();
  closeAddModal();
  renderArticles();
  toast(`"${name}" hozzáadva!`);
}

/* ════════════════════════════════════════════════════════════
   EVENT BINDINGS
══════════════════════════════════════════���═════════════════ */
function bindEvents() {
  // Layout cycle button
  $('layoutCycleBtn').onclick = () => {
    const i = LAYOUT_ORDER.indexOf(S.layout);
    setLayout(LAYOUT_ORDER[(i + 1) % LAYOUT_ORDER.length]);
  };
  // ── Hover preview: Presets ───────────────────────────────
  let _pP = undefined, _pA = undefined; // undefined = not previewing
  const pg = $('presetGrid');
  pg.addEventListener('mouseover', ev => {
    const card = ev.target.closest('.preset-card[data-preset]');
    if (!card) return;
    if (_pP === undefined) { _pP = S.preset; _pA = S.customAccent; }
    S.preset = card.dataset.preset; S.customAccent = null;
    Theme.apply();
    pg.querySelectorAll('.preset-card').forEach(c => c.classList.toggle('active', c.dataset.preset === S.preset));
  });
  pg.addEventListener('mouseleave', () => {
    if (_pP === undefined) return;
    S.preset = _pP; S.customAccent = _pA; _pP = _pA = undefined;
    Theme.apply();
    pg.querySelectorAll('.preset-card').forEach(c => c.classList.toggle('active', c.dataset.preset === S.preset));
  });
  pg.addEventListener('click', ev => {
    const card = ev.target.closest('.preset-card[data-preset]');
    if (!card) return;
    _pP = _pA = undefined;
    setPreset(card.dataset.preset);
  });

  // ── Hover preview: Accent swatches ───────────────────────
  let _pC = undefined;
  const sr = $('swatchRow');
  sr.addEventListener('mouseover', ev => {
    const sw = ev.target.closest('.swatch[data-color]');
    if (!sw) return;
    if (_pC === undefined) _pC = S.customAccent;
    S.customAccent = sw.dataset.color;
    Theme.apply();
    sr.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === S.customAccent));
  });
  sr.addEventListener('mouseleave', () => {
    if (_pC === undefined) return;
    S.customAccent = _pC; _pC = undefined;
    Theme.apply();
    sr.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === S.customAccent));
  });
  sr.addEventListener('click', ev => {
    const sw = ev.target.closest('.swatch[data-color]');
    if (!sw) return;
    _pC = undefined;
    setAccent(sw.dataset.color);
  });

  // ── Hover preview: Layout ─────────────────────────────────
  let _pL = undefined, _pLTimer;
  const slb = $('sLayoutBar');
  slb.addEventListener('mouseover', ev => {
    const b = ev.target.closest('.s-layout-btn[data-layout]');
    if (!b) return;
    if (_pL === undefined) _pL = S.layout;
    clearTimeout(_pLTimer);
    _pLTimer = setTimeout(() => {
      S.layout = b.dataset.layout;
      slb.querySelectorAll('.s-layout-btn').forEach(x => x.classList.toggle('active', x.dataset.layout === S.layout));
      updateCycleBtn(false);
      renderArticles();
    }, 80);
  });
  slb.addEventListener('mouseleave', () => {
    clearTimeout(_pLTimer);
    if (_pL === undefined) return;
    S.layout = _pL; _pL = undefined;
    slb.querySelectorAll('.s-layout-btn').forEach(x => x.classList.toggle('active', x.dataset.layout === S.layout));
    updateCycleBtn(false);
    renderArticles();
  });
  // Layout bar (settings) — click confirms
  slb.addEventListener('click', ev => {
    const b = ev.target.closest('.s-layout-btn');
    if (!b) return;
    _pL = undefined;
    setLayout(b.dataset.layout);
  });

  // Settings dropdown — hover + click toggle
  let _sTimer;
  const _sBtn = $('settingsBtn'), _sPanel = $('settingsPanel');
  const openSettings  = () => { clearTimeout(_sTimer); renderSFeeds(); _sPanel.classList.add('open'); };
  const closeSettings = () => { _sTimer = setTimeout(() => _sPanel.classList.remove('open'), 150); };
  _sBtn.addEventListener('mouseenter', openSettings);
  _sBtn.addEventListener('mouseleave', closeSettings);
  _sPanel.addEventListener('mouseenter', () => clearTimeout(_sTimer));
  _sPanel.addEventListener('mouseleave', closeSettings);
  _sBtn.addEventListener('click', () => _sPanel.classList.toggle('open') && renderSFeeds());

  // Overlay click — only for add-feed modal now
  $('overlay').onclick = () => { closeAddModal(); $('overlay').classList.remove('open'); };

  // Close settings on outside click
  document.addEventListener('click', ev => {
    if (!_sBtn.contains(ev.target) && !_sPanel.contains(ev.target)) _sPanel.classList.remove('open');
  });

  // Add feed
  $('addFeedBtn').onclick = openAddModal;
  $('cancelAdd').onclick = closeAddModal;
  $('confirmAdd').onclick = submitAddFeed;
  $('feedUrl').addEventListener('keydown', ev => { if (ev.key === 'Enter') submitAddFeed(); });

  // Mode toggle
  $('modeBar').addEventListener('click', ev => {
    const b = ev.target.closest('.mode-btn');
    if (b) { S.theme = b.dataset.mode; saveSettings(); Theme.apply(); }
  });

  // Font slider
  $('fontSlider').addEventListener('input', ev => {
    S.fontSize = +ev.target.value;
    document.documentElement.style.setProperty('--font-size-base', S.fontSize + 'px');
  });
  $('fontSlider').addEventListener('change', saveSettings);


  // Auto dark/light
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (S.theme === 'auto') Theme.apply();
  });

  // Escape closes article view
  document.addEventListener('keydown', ev => {
    if (ev.key === 'Escape' && document.getElementById('articleView').classList.contains('open')) {
      closeArticle();
    }
  });

}

const WX_CDN = 'https://cdn.jsdelivr.net/gh/basmilius/weather-icons/production/fill/all/';
// [day-name, night-name]
const WX_ICONS = {
  0: ['clear-day','clear-night'],
  1: ['partly-cloudy-day','partly-cloudy-night'],
  2: ['partly-cloudy-day','partly-cloudy-night'],
  3: ['overcast-day','overcast-night'],
  45:['fog-day','fog-night'], 48:['fog-day','fog-night'],
  51:['partly-cloudy-day-drizzle','partly-cloudy-night-drizzle'],
  53:['drizzle','drizzle'], 55:['rain','rain'],
  61:['partly-cloudy-day-rain','partly-cloudy-night-rain'],
  63:['rain','rain'], 65:['rain','rain'],
  71:['partly-cloudy-day-snow','partly-cloudy-night-snow'],
  73:['snow','snow'], 75:['snow','snow'],
  80:['partly-cloudy-day-rain','partly-cloudy-night-rain'],
  81:['rain','rain'], 82:['thunderstorms-rain','thunderstorms-rain'],
  95:['thunderstorms-day-rain','thunderstorms-night-rain'],
  96:['thunderstorms-rain','thunderstorms-rain'],
  99:['thunderstorms-rain','thunderstorms-rain']
};
const _wxSvgCache = {};
let _wxUid = 0;
async function _wxFetch(name) {
  if (_wxSvgCache[name]) return _wxSvgCache[name];
  try {
    const r = await fetch(WX_CDN + name + '.svg');
    _wxSvgCache[name] = await r.text();
  } catch(e) { _wxSvgCache[name] = ''; }
  return _wxSvgCache[name];
}
function wxInline(svgText, size) {
  if (!svgText) return `<div style="width:${size}px;height:${size}px"></div>`;
  // Make every inlined SVG's IDs unique to prevent gradient ID collisions
  const p = 'wx' + (_wxUid++);
  let svg = svgText
    .replace(/\bid="([^"]+)"/g,    `id="${p}$1"`)
    .replace(/url\(#([^)]+)\)/g,   `url(#${p}$1)`)
    .replace(/href="#([^"]+)"/g,   `href="#${p}$1"`);
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (!dark) {
    // Light bg: only near-white cloud colors need darkening
    svg = svg
      .replace(/#f3f7fe/gi, '#bfdbfe')  // cloud fill light  → blue-200
      .replace(/#deeafb/gi, '#93c5fd')  // cloud fill darker → blue-300
      .replace(/#e6effc/gi, '#93c5fd'); // cloud stroke      → blue-300
  }
  // Dark mode: original fill colors are perfect as-is
  return svg.replace(/<svg\b/, `<svg width="${size}" height="${size}" style="display:block;flex-shrink:0;overflow:visible"`);
}
function wxIconName(code, isDay) {
  const pair = WX_ICONS[code] || ['not-available','not-available'];
  return pair[isDay ? 0 : 1];
}
const WX_LABELS = {
  0:'Derült',1:'Enyhén felhős',2:'Változékony',3:'Borult',
  45:'Köd',48:'Zúzmarás köd',
  51:'Szitálás',53:'Szitálás',55:'Erős szitálás',
  61:'Eső',63:'Eső',65:'Erős eső',
  71:'Hószállingózás',73:'Havazás',75:'Erős havazás',
  80:'Zápor',81:'Erős zápor',82:'Viharos zápor',
  95:'Zivatar',96:'Zivatar jégesővel',99:'Zivatar jégesővel'
};

async function loadWeather() {
  const el = document.getElementById('navWeather');
  if (!el) return;
  const WX_TTL = 30 * 60 * 1000; // 30 perc

  async function renderWx(w) {
    const label = WX_LABELS[w.code] || '';
    const feels = w.feels    !== undefined ? w.feels    : '–';
    const humid = w.humidity !== undefined ? w.humidity : '–';
    const wind  = w.wind     !== undefined ? w.wind     : '–';

    const h = new Date().getHours();
    const isDay = h >= 6 && h < 21;

    // Pre-fetch all needed icons in parallel
    // Recompute isSunset dynamically from sunsetTime (handles stale cache)
    const sunsetHourRx = w.sunsetTime ? parseInt(w.sunsetTime) : -1;
    const hourSlots  = (w.hours || []).slice(1, 7).map(hr => ({
      ...hr, isSunset: parseInt(hr.time) === sunsetHourRx
    }));
    const dayCodes   = (w.days  || []).map(d => wxIconName(d.code, true));
    const uvName     = `uv-index-${Math.min(Math.max(w.uv, 1), 11)}`;
    const hasSunset  = hourSlots.some(hr => hr.isSunset);
    // Pre-fetch uses per-slot hrIsDay so night variants are also cached
    const hourIconNames = hourSlots.map(hr => {
      const hrIsDay = parseInt(hr.time) >= 6 && parseInt(hr.time) < 21;
      return wxIconName(hr.code, hrIsDay);
    });
    const allNames   = [
      wxIconName(w.code, isDay),
      ...hourIconNames,
      ...dayCodes,
      uvName, 'wind', 'raindrop',
      ...(hasSunset ? ['sunset'] : [])
    ];
    await Promise.all([...new Set(allNames)].map(n => _wxFetch(n)));

    const ic = (name, size) => wxInline(_wxSvgCache[name] || '', size);

    const mainSvg = ic(wxIconName(w.code, isDay), 52);
    const navSvg  = ic(wxIconName(w.code, isDay), 22);

    const hourlyHtml = hourSlots.map(hr => {
      const hrIsDay = parseInt(hr.time) >= 6 && parseInt(hr.time) < 21;
      if (hr.isSunset) {
        return `<div class="wx-hour">
          <span class="wx-hour-time" style="color:var(--ac);font-weight:600">${w.sunsetTime}</span>
          <div class="wx-hour-icon">${ic('sunset', 24)}</div>
          <span class="wx-hour-temp">${hr.temp}°</span>
        </div>`;
      }
      return `<div class="wx-hour">
        <span class="wx-hour-time">${hr.time || ''}</span>
        <div class="wx-hour-icon">${ic(wxIconName(hr.code, hrIsDay), 24)}</div>
        <span class="wx-hour-temp">${hr.temp}°</span>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="nav-weather-icon">${navSvg}</div>
      <span class="nav-weather-temp">${w.temp}°</span>
      <div class="wx-popup" id="wxPopup">
        <div class="wx-top">
          <div class="wx-left">
            <div class="wx-big-temp">${w.temp}°</div>
          </div>
          <div class="wx-main-right">
            <div class="wx-big-icon">${mainSvg}</div>
            <div class="wx-condition">${label}</div>
          </div>
        </div>
        <div class="wx-bottom-row">
          <div class="wx-meta">
            ${w.precip0 > 0 ? `<span>${ic('raindrop', 14)}${w.precip0}%</span>` : ''}
            <span>${ic(uvName, 14)}UV ${w.uv}</span>
            <span>${ic('wind', 14)}${wind} km/h</span>
          </div>
          <div class="wx-minmax"><span style="color:#60a5fa">↓${w.tmin}°</span>&nbsp; <span style="color:#f97316">↑${w.tmax}°</span></div>
        </div>
        <div class="wx-hourly">${hourlyHtml}</div>
        <div class="wx-forecast">${(w.days || []).map((day, i) => {
          const HU = ['Vasárnap','Hétfő','Kedd','Szerda','Csütörtök','Péntek','Szombat'];
          return `<div class="wx-frow">
            <span class="wx-fday">${i === 0 ? 'Holnap' : HU[day.dow]}</span>
            <span class="wx-ficon">${ic(wxIconName(day.code, true), 20)}</span>
            <span class="wx-fcond">${WX_LABELS[day.code] || ''}</span>
            <span class="wx-frain" style="display:flex;align-items:center;justify-content:flex-end;gap:2px">${day.precip > 0 ? `${day.precip}%${ic('raindrop', 11)}` : ''}</span>
            <span class="wx-ftemp"><span class="wx-ftemp-min">${day.tmin}°</span><span class="wx-ftemp-max">${day.tmax}°</span></span>
          </div>`;
        }).join('')}</div>
      </div>`;
    el.title = '';

    // JS hover with timer — mouse can move into popup without closing it
    let _wxHTimer;
    const wxOpen  = () => { clearTimeout(_wxHTimer); document.getElementById('wxPopup')?.classList.add('wx-open'); };
    const wxClose = () => { _wxHTimer = setTimeout(() => document.getElementById('wxPopup')?.classList.remove('wx-open'), 150); };
    el.addEventListener('mouseenter', wxOpen);
    el.addEventListener('mouseleave', wxClose);
    document.getElementById('wxPopup').addEventListener('mouseenter', wxOpen);
    document.getElementById('wxPopup').addEventListener('mouseleave', wxClose);
  }

  // Cached adat elég friss? (és teljes — régi cache-t eldobjuk)
  try {
    const cached = JSON.parse(localStorage.getItem('flux_wx') || 'null');
    const fresh = cached && Date.now() - cached.ts < WX_TTL && cached.uv !== undefined && cached.hours && cached.hours.length && cached.days && cached.days.length && cached.sunsetTime;
    const newFormat = fresh && !String(cached.hours[0]?.time || '').includes(':');
    if (fresh && newFormat) { renderWx(cached); return; }
  } catch(e) {}

  try {
    // Koordináta: cache-ből vagy fresh geolocation
    let lat, lon;
    const cachedCoords = JSON.parse(localStorage.getItem('flux_wx_coords') || 'null');
    if (cachedCoords) {
      lat = cachedCoords.lat; lon = cachedCoords.lon;
    } else {
      const pos = await new Promise((res, rej) =>
        navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 })
      );
      lat = pos.coords.latitude; lon = pos.coords.longitude;
      localStorage.setItem('flux_wx_coords', JSON.stringify({ lat, lon }));
    }

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,weathercode,apparent_temperature,relative_humidity_2m,wind_speed_10m,uv_index` +
      `&hourly=temperature_2m,weathercode` +
      `&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,sunset` +
      `&timezone=auto&forecast_days=7`;
    const d = await fetch(url).then(r => r.json());

    // Parse sunset time for today
    const sunsetStr  = d.daily.sunset?.[0] || '';          // "2026-04-02T19:43"
    const sunsetTime = sunsetStr.slice(11, 16);             // "19:43"
    const sunsetHour = sunsetTime ? parseInt(sunsetTime)  : -1;

    // Next 7 hours from current hour (slice(1) later gives 6 columns)
    const nowH = new Date().getHours();
    const hours = [];
    for (let i = 0; i < 7; i++) {
      const hi = nowH + i;
      if (hi < (d.hourly.time || []).length) {
        const hourOfDay = hi % 24;
        hours.push({
          time:     String(hourOfDay),
          temp:     Math.round(d.hourly.temperature_2m[hi]),
          code:     d.hourly.weathercode[hi],
          isSunset: hourOfDay === sunsetHour
        });
      }
    }

    const w = {
      temp:     Math.round(d.current.temperature_2m),
      feels:    Math.round(d.current.apparent_temperature),
      humidity: d.current.relative_humidity_2m,
      wind:     Math.round(d.current.wind_speed_10m),
      code:     d.current.weathercode,
      uv:       Math.round(d.current.uv_index ?? 0),
      precip0:  d.daily.precipitation_probability_max?.[0] ?? 0,
      tmax:     Math.round(d.daily.temperature_2m_max[0]),
      tmin:     Math.round(d.daily.temperature_2m_min[0]),
      sunsetTime,
      hours,
      days: [1,2,3,4,5].map(i => ({
        dow:    new Date((d.daily.time[i] || '') + 'T12:00:00').getDay(),
        code:   d.daily.weathercode[i],
        tmax:   Math.round(d.daily.temperature_2m_max[i]),
        tmin:   Math.round(d.daily.temperature_2m_min[i]),
        precip: d.daily.precipitation_probability_max?.[i] ?? 0
      })).filter(x => !isNaN(x.tmax)),
      ts:       Date.now()
    };
    localStorage.setItem('flux_wx', JSON.stringify(w));
    renderWx(w);
  } catch(e) {
    el.style.display = 'none';
  }
}

/* ════════════════════════════════════════════════════════════
   F1 WIDGET
════════════════════════════════════════════════════════════ */
const F1_TEAM_COLORS = {
  'Mercedes':'#00D2BE','McLaren':'#FF8700','Ferrari':'#DC0000',
  'Red Bull':'#3671C6','Williams':'#64C4FF','Aston Martin':'#358C75',
  'Alpine':'#FF87BC','RB':'#6692FF','Haas F1 Team':'#B6BABD',
  'Kick Sauber':'#52E252','Sauber':'#52E252'
};
const F1_HU = ['jan','feb','már','ápr','máj','jún','júl','aug','szep','okt','nov','dec'];
const F1_BASE = 'https://api.jolpi.ca/ergast/f1';
const F1_TTL  = 30 * 60 * 1000;

function renderF1(f1) {
  const el = document.getElementById('navF1');
  if (!el) return;

  const shortName = n => n.replace(' Grand Prix','').replace(' GP','') + ' GP';
  const fmtDate  = d => { const dt = new Date(d+'T12:00:00'); return `${F1_HU[dt.getMonth()]} ${dt.getDate()}.`; };
  const teamDot  = c => `<span class="f1-team-dot" style="background:${F1_TEAM_COLORS[c]||'#555'}"></span>`;
  const teamBar  = c => `<span class="f1-team-bar" style="background:${F1_TEAM_COLORS[c]||'#555'}"></span>`;

  // Countdown
  let countdown = '';
  if (f1.nextRace) {
    const diff = new Date(f1.nextRace.dateTime) - Date.now();
    if (diff > 0) {
      const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000);
      countdown = d > 0 ? `${d} nap` : h > 0 ? `${h} ó` : 'Ma!';
    } else { countdown = 'Ma!'; }
  }

  const nextSection = f1.nextRace ? `
    <div class="f1-section">
      <div class="f1-section-title">Következő futam</div>
      <div class="f1-next-name">${shortName(f1.nextRace.name)}</div>
      <div class="f1-next-circuit">${f1.nextRace.circuit}</div>
      <div class="f1-countdown">${countdown}</div>
      <div class="f1-next-date">${new Date(f1.nextRace.dateTime).toLocaleString('hu-HU',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
    </div>` : '';

  const podiumSection = f1.lastRace?.podium?.length ? `
    <div class="f1-section">
      <div class="f1-section-title">Utolsó futam · ${shortName(f1.lastRace.name)}</div>
      ${f1.lastRace.podium.map(p => `
        <div class="f1-podium-row">
          <span class="f1-pos">P${p.pos}</span>
          ${teamDot(p.constructor)}
          <span class="f1-driver">${p.driver}</span>
          <span class="f1-constructor">${p.constructor}</span>
        </div>`).join('')}
    </div>` : '';

  const standingsSection = f1.standings?.length ? `
    <div class="f1-section">
      <div class="f1-section-title">Pilóta bajnokság</div>
      ${f1.standings.map(s => `
        <div class="f1-standing-row">
          <span class="f1-standing-pos">${s.pos}</span>
          ${teamBar(s.constructor)}
          <span class="f1-standing-driver">${s.driver}</span>
          <span class="f1-standing-pts">${s.points}</span>
        </div>`).join('')}
    </div>` : '';

  const calSection = f1.upcoming?.length ? `
    <div class="f1-section">
      <div class="f1-section-title">Kövi futamok</div>
      ${f1.upcoming.map((r,i) => `
        <div class="f1-cal-row${i===0?' f1-cal-next':''}">
          <span class="f1-cal-dot"></span>
          <span class="f1-cal-name">${shortName(r.name)}</span>
          <span class="f1-cal-date">${fmtDate(r.date)}</span>
        </div>`).join('')}
    </div>` : '';

  const badgeLabel = f1.nextRace
    ? `${shortName(f1.nextRace.name)}<span class="f1-badge-sep">|</span>${countdown}`
    : `F1`;

  el.innerHTML = `
    <span class="f1-badge">${badgeLabel}</span>
    <div class="f1-popup" id="f1Popup">
      ${nextSection}${podiumSection}${standingsSection}${calSection}
    </div>`;

  let _f1T;
  const f1Open  = () => { clearTimeout(_f1T); document.getElementById('f1Popup')?.classList.add('f1-open'); };
  const f1Close = () => { _f1T = setTimeout(() => document.getElementById('f1Popup')?.classList.remove('f1-open'), 150); };
  el.addEventListener('mouseenter', f1Open);
  el.addEventListener('mouseleave', f1Close);
  document.getElementById('f1Popup').addEventListener('mouseenter', f1Open);
  document.getElementById('f1Popup').addEventListener('mouseleave', f1Close);
}

async function loadF1() {
  try {
    const cached = JSON.parse(localStorage.getItem('flux_f1') || 'null');
    if (cached && Date.now() - cached.ts < F1_TTL) { renderF1(cached); return; }
  } catch(e) {}
  try {
    const [schedJ, lastJ, standJ] = await Promise.all([
      fetch(`${F1_BASE}/current.json`).then(r=>r.json()),
      fetch(`${F1_BASE}/current/last/results.json`).then(r=>r.json()),
      fetch(`${F1_BASE}/current/driverStandings.json`).then(r=>r.json())
    ]);
    const now   = Date.now();
    const races = schedJ.MRData.RaceTable.Races;
    const future = races.filter(r => new Date(r.date+'T'+(r.time||'12:00:00Z')) > now);
    const next  = future[0];
    const lastRaceData = lastJ.MRData.RaceTable.Races[0];
    const f1 = {
      nextRace: next ? {
        name:     next.raceName,
        circuit:  next.Circuit.circuitName,
        dateTime: next.date+'T'+(next.time||'12:00:00Z')
      } : null,
      lastRace: {
        name:   lastRaceData?.raceName || '',
        podium: (lastRaceData?.Results||[]).slice(0,3).map(r=>({
          pos: r.position, driver: r.Driver.familyName, constructor: r.Constructor.name
        }))
      },
      standings: (standJ.MRData.StandingsTable.StandingsLists[0]?.DriverStandings||[]).slice(0,6).map(s=>({
        pos: s.position, driver: s.Driver.familyName,
        points: s.points, constructor: s.Constructors[0]?.name||''
      })),
      upcoming: future.slice(0,6).map(r=>({ name: r.raceName, date: r.date })),
      ts: Date.now()
    };
    localStorage.setItem('flux_f1', JSON.stringify(f1));
    renderF1(f1);
  } catch(e) { console.warn('F1 load error', e); }
}

/* ════════════════════════════════════════════════════════════

(async function init() {
  loadStorage();
  Theme.apply();
  buildSettingsUI();

  bindEvents();
  updateCycleBtn(false);
  loadWeather();
  loadF1();

  const contentEl = document.getElementById('content');
  const navbar = document.getElementById('navbar');
  contentEl.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', contentEl.scrollTop > 10);
  }, { passive: true });

  if (S.feeds.length) await refreshAll();
})();
